<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>生产计划甘特图看板</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;700&display=swap">
<style>
  :root{
    --bg:#f4f6f9; --panel:#ffffff; --line:#e4e8ee; --line-2:#eef1f5;
    --text:#1e2733; --text-dim:#7b8794;
    --blue:#4a90e2; --blue-soft:#dbeafe; --amber:#f5a623;
    --green:#34b46f; --red:#e5484d; --radius:8px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0; padding:0; background:var(--bg);}
  body{font-family:'Noto Sans SC',-apple-system,sans-serif; color:var(--text); min-height:100vh; -webkit-font-smoothing:antialiased;}

  /* ===== 顶栏 ===== */
  .topbar{display:flex; align-items:center; justify-content:space-between; padding:13px 20px;
    background:var(--panel); border-bottom:1px solid var(--line); gap:12px; flex-wrap:wrap; position:sticky; top:0; z-index:20;}
  .brand h1{font-size:18px; margin:0; font-weight:700; display:flex; align-items:center; gap:8px;}
  .title-edit-btn{background:transparent; border:1px solid var(--line); color:var(--text-dim); border-radius:5px; font-size:11px; padding:2px 7px; cursor:pointer;}
  .title-edit-btn:hover{color:var(--text); border-color:#c4ccd6;}
  .toolbar{display:flex; gap:8px; align-items:center; flex-wrap:wrap;}
  .btn{background:var(--panel); color:var(--text); border:1px solid var(--line); padding:8px 14px;
    border-radius:var(--radius); font-size:13px; cursor:pointer; font-weight:500; transition:.12s; box-shadow:0 1px 2px rgba(16,24,40,.04);}
  .btn:hover{border-color:#c4ccd6; background:#fafbfc;}
  .btn.primary{background:var(--blue); color:#fff; border-color:var(--blue); font-weight:600;}
  .btn.primary:hover{background:#3d80d0;}
  .btn.toggled{background:#eef4fc; color:var(--blue); border-color:#bcd7f5;}
  .zoomset{display:flex; border:1px solid var(--line); border-radius:var(--radius); overflow:hidden; background:var(--panel);}
  .zoomset button{background:transparent; color:var(--text-dim); border:none; padding:8px 12px; font-size:12px; cursor:pointer;}
  .zoomset button.active{background:var(--blue); color:#fff; font-weight:600;}
  .zoomset button:not(:last-child){border-right:1px solid var(--line);}

  .subbar{display:flex; align-items:center; gap:18px; padding:10px 20px 0; flex-wrap:wrap;}
  .status{display:flex; align-items:center; gap:6px; font-size:12px; color:var(--text-dim);}
  .dot{width:8px; height:8px; border-radius:50%; background:#c4ccd6;}
  .dot.ok{background:var(--green);}
  .dot.err{background:var(--red);}
  .dot.warn{background:var(--amber); animation:pulse-dot 1.2s ease-in-out infinite;}
  @keyframes pulse-dot{0%,100%{opacity:1;}50%{opacity:.4;}}
  .legend{display:flex; gap:14px; font-size:12px; color:var(--text-dim); align-items:center; flex-wrap:wrap;}
  .lg{display:inline-flex; align-items:center; gap:5px;}
  .lg i{width:16px; height:10px; border-radius:5px; display:inline-block;}
  .lg .c-plan{background:var(--blue-soft); border:1.5px solid var(--blue);}
  .lg .c-prog{background:var(--amber);}
  .lg .c-done{background:var(--green);}

  /* ===== 统计面板 ===== */
  .stats-panel{margin:14px 20px 0; background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:14px 16px; box-shadow:0 1px 3px rgba(16,24,40,.06);}
  .stats-head{display:flex; align-items:center; gap:12px; flex-wrap:wrap; margin-bottom:12px;}
  .stats-head h3{margin:0; font-size:14px; font-weight:700;}
  .stats-head input[type=date]{border:1px solid var(--line); border-radius:7px; padding:5px 9px; font-size:12.5px; color:var(--text); font-family:'Noto Sans SC',sans-serif;}
  .stats-head .spacer{flex:1;}
  .kpi-row{display:flex; gap:12px; flex-wrap:wrap;}
  .kpi{flex:1; min-width:150px; background:#f8fafc; border:1px solid var(--line-2); border-radius:10px; padding:10px 14px;}
  .kpi .k-label{font-size:11.5px; color:var(--text-dim); margin-bottom:3px;}
  .kpi .k-value{font-size:20px; font-weight:700; font-family:'IBM Plex Mono',monospace; line-height:1.2;}
  .kpi .k-sub{font-size:11px; color:var(--text-dim); margin-top:2px;}
  .kpi.good .k-value{color:var(--green);}
  .kpi.warn .k-value{color:var(--amber);}
  .kpi.bad .k-value{color:var(--red);}
  .proj-table{width:100%; border-collapse:collapse; margin-top:12px; font-size:12.5px;}
  .proj-table th{text-align:left; color:var(--text-dim); font-weight:600; font-size:11.5px; padding:5px 8px; border-bottom:1px solid var(--line);}
  .proj-table td{padding:6px 8px; border-bottom:1px solid var(--line-2);}
  .proj-table .num{font-family:'IBM Plex Mono',monospace; text-align:right;}
  .util-track{height:6px; background:var(--line-2); border-radius:3px; overflow:hidden; min-width:80px;}
  .util-fill{height:100%; background:var(--blue); border-radius:3px;}

  /* ===== 甘特区 ===== */
  .board-wrap{padding:14px 20px 50px;}
  .board-scroll{overflow:auto; border:1px solid var(--line); border-radius:12px; background:var(--panel); max-height:76vh; box-shadow:0 1px 3px rgba(16,24,40,.06);}
  table.board{border-collapse:separate; border-spacing:0;}
  .namecol{position:sticky; left:0; z-index:3; background:var(--panel); width:310px; min-width:310px; max-width:310px;
    border-right:1px solid var(--line); padding:0 14px; vertical-align:middle;}
  thead th{position:sticky; top:0; z-index:4; background:#fafbfd; border-bottom:1px solid var(--line); padding:0;}
  thead .corner{position:sticky; left:0; z-index:6; background:#fafbfd;}
  .tl-header{position:relative; height:42px; background:#fafbfd;}
  .th-day{position:absolute; top:5px; font-size:12px; font-weight:700; color:var(--text); padding-left:7px; border-left:2px solid #b9c4d1; height:32px; white-space:nowrap; overflow:hidden;}
  .th-day.collapsed{color:var(--text-dim); font-weight:600;}
  .th-hour{position:absolute; top:24px; font-size:10px; color:#5f6b78; font-family:'IBM Plex Mono',monospace; transform:translateX(3px);}
  .now-chip{position:absolute; top:1px; transform:translateX(-50%); background:var(--red); color:#fff;
    font-size:10px; font-weight:700; padding:2px 7px; border-radius:9px; white-space:nowrap; z-index:7; box-shadow:0 2px 6px rgba(229,72,77,.4);}

  tr.group-row td{background:#f0f4fa; border-top:1px solid var(--line); border-bottom:1px solid var(--line); padding:8px 14px;}
  .group-label{font-size:13px; font-weight:700; color:#2c5aa0; display:flex; align-items:center; gap:8px;}
  .group-label::before{content:''; width:4px; height:16px; background:var(--blue); border-radius:2px;}

  tr.task-row td{background:#fff; border-bottom:1px solid var(--line-2); padding:0;}
  tr.task-row .namecol{padding:10px 14px 6px;}
  .task-head{display:flex; align-items:baseline; gap:8px; flex-wrap:wrap;}
  .task-name{font-size:14px; font-weight:700;}
  .temp-badge{font-size:10px; color:#fff; background:var(--amber); padding:1px 7px; border-radius:9px; font-weight:600;}
  .done-badge{font-size:10.5px; color:#fff; background:var(--green); padding:1px 8px; border-radius:9px; font-weight:600;}
  .task-meta{font-size:11px; color:var(--text-dim); width:100%;}
  .task-actions{display:flex; gap:8px; margin-top:5px; flex-wrap:wrap;}
  .mini-btn{background:transparent; border:none; color:var(--blue); font-size:11.5px; cursor:pointer; padding:0;}
  .mini-btn:hover{text-decoration:underline;}
  .mini-btn.danger{color:var(--red);}
  .mini-btn.quick{border:1px solid #bcd7f5; background:#f2f8ff; padding:2px 10px; border-radius:12px; font-weight:600;}
  .mini-btn.quick.finish{border-color:#f3d9a4; background:#fdf6e7; color:#b57904;}
  .mini-btn.quick:hover{text-decoration:none; filter:brightness(.97);}
  .progress-track{height:5px; background:var(--line-2); border-radius:3px; margin-top:7px; overflow:hidden;}
  .progress-fill{height:100%; background:var(--green); border-radius:3px; transition:width .3s;}

  tr.step-row td{border-bottom:1px solid var(--line-2);}
  tr.step-row:hover td{background:#f8fafc;}
  tr.step-row .namecol{padding:0 14px;}
  .step-line{display:flex; align-items:center; gap:7px; height:42px;}
  .step-status-ic{width:20px; height:20px; border-radius:50%; flex:none; display:flex; align-items:center; justify-content:center;
    font-size:11px; color:#fff; font-weight:800; border:2px solid #b6c1cd; background:#fff; cursor:pointer; transition:.12s;}
  .step-status-ic:hover{border-color:var(--blue); transform:scale(1.12);}
  .step-status-ic.inprogress{border-color:var(--amber); background:var(--amber);}
  .step-status-ic.done{border-color:var(--green); background:var(--green);}
  .step-label-text{font-size:13px; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  tr.step-row.is-done .step-label-text{color:#a4afba; text-decoration:line-through;}
  .step-min{font-size:11px; color:var(--text-dim); font-family:'IBM Plex Mono',monospace; flex:none;}
  .time-btn{flex:none; background:transparent; border:1px solid var(--line); color:var(--text-dim); border-radius:6px; font-size:10.5px; padding:2px 7px; cursor:pointer;}
  .time-btn:hover{color:var(--blue); border-color:#bcd7f5;}
  .step-btn{flex:none; font-size:11px; padding:3px 11px; border-radius:12px; cursor:pointer; border:1px solid var(--line); background:#fff; color:var(--text-dim); font-weight:500;}
  .step-btn.start{color:var(--blue); border-color:#bcd7f5;}
  .step-btn.start:hover{background:var(--blue); color:#fff; border-color:var(--blue);}
  .step-btn.finish{color:#b57904; border-color:#f3d9a4; background:#fdf6e7;}
  .step-btn.finish:hover{background:var(--amber); color:#fff; border-color:var(--amber);}
  .step-btn.undo{color:var(--green); border-color:transparent; background:transparent; font-weight:700; font-size:13px;}

  .timelinecell{position:relative; padding:0; vertical-align:middle;}
  .lane{position:relative; height:42px;}
  .lane.task-lane{height:34px;}
  .shade{position:absolute; top:0; bottom:0; background:#f2f5f9; pointer-events:none;}
  .shade.night{background:#e8edf3;
    background-image:repeating-linear-gradient(45deg, transparent, transparent 4px, #dde4ec 4px, #dde4ec 6px);}
  .shade.meal{background:#ffe9d2; border-left:1px dashed #f0b477; border-right:1px dashed #f0b477;}
  .shade.dayoff-weekend{background:#fbf3e2;}
  .shade.dayoff-holiday{background:#fdecec;}
  .day-badge{font-size:10px; margin-left:5px; padding:1px 7px; border-radius:8px; font-weight:600; vertical-align:1px;}
  .day-badge.weekend{background:#fef3c7; color:#b45309;}
  .day-badge.holiday{background:#fee2e2; color:#dc2626;}

  /* 时间栏（第二列固定：预计与实际起止时间） */
  .timecol{
    position:sticky; left:310px; z-index:3; background:var(--panel);
    width:148px; min-width:148px; max-width:148px; border-right:1px solid var(--line);
    padding:4px 10px; vertical-align:middle;
  }
  .tc-line{font-size:11px; font-family:'IBM Plex Mono',monospace; color:var(--text); line-height:1.7; white-space:nowrap;}
  .tc-line .tc-k{display:inline-block; width:30px; color:var(--text-dim); font-family:'Noto Sans SC',sans-serif; font-size:10.5px;}
  .tc-line.done{color:var(--green); font-weight:600;}
  .tc-line.prog{color:#b57904;}
  .tc-line.dim{color:#b3bdc8;}
  tr.step-row .timecol:hover{background:#eef4fb;}
  th.timecol{z-index:6; top:0; background:#fafbfd; vertical-align:bottom; padding-bottom:8px;}

  /* 数据变动后的图表互动反馈：改动的任务整块闪一下、色条弹入 */
  @keyframes rowFlash{0%{background:#fff3c4;}100%{background:transparent;}}
  tr.flash-row td{animation:rowFlash 1.5s ease;}
  @keyframes barPop{0%{transform:scaleY(.35); opacity:.25;}60%{transform:scaleY(1.15);}100%{transform:scaleY(1); opacity:1;}}
  tr.flash-row .bar, tr.flash-row .summary-bar{animation:barPop .45s ease; transform-origin:center;}

  /* 悬停联动：指到左侧工序，右侧色条同步突出 */
  tr.step-row:hover .bar{filter:brightness(1.07); box-shadow:0 3px 10px rgba(16,24,40,.22);}
  tr.step-row:hover .timecol{background:#f8fafc;}

  .date-hint{font-size:12px; color:#b45309; background:#fff7ed; border:1px solid #fde4bf; border-radius:8px; padding:7px 11px; margin:-4px 0 12px; display:flex; align-items:center; gap:8px; flex-wrap:wrap;}
  .date-hint button{border:1px solid #f3c98a; background:#fff; color:#b45309; border-radius:7px; font-size:11.5px; padding:3px 10px; cursor:pointer; font-weight:600;}
  .date-hint button:hover{background:#b45309; color:#fff;}
  .shade.collapsed{background:#e9edf3;
    background-image:repeating-linear-gradient(45deg, transparent, transparent 6px, rgba(0,0,0,.035) 6px, rgba(0,0,0,.035) 12px);}
  .gridline{position:absolute; top:0; bottom:0; width:1px; background:var(--line-2); pointer-events:none;}
  .gridline.day{background:#b9c4d1; width:2px;}
  .now-line{position:absolute; top:0; bottom:0; width:2px; background:var(--red); z-index:5; pointer-events:none; box-shadow:0 0 5px rgba(229,72,77,.55);}

  .summary-bar{position:absolute; top:10px; height:14px; background:#e2e8f0; border-radius:7px; border:1px solid #cbd5e1;}
  .summary-fill{position:absolute; top:0; bottom:0; left:0; background:#b6c6da; border-radius:7px;}

  .bar{position:absolute; top:10px; height:22px; border-radius:11px; cursor:pointer; display:flex; align-items:center; padding:0 9px;
    font-size:11px; font-weight:600; white-space:nowrap; box-shadow:0 1px 2px rgba(16,24,40,.10); transition:transform .1s, box-shadow .1s;}
  .bar:hover{transform:translateY(-1px); box-shadow:0 3px 8px rgba(16,24,40,.15);}
  .bar.pending{background:var(--blue-soft); border:1.5px solid var(--blue); color:#2563b0;}
  .bar.inprogress{background:var(--amber); color:#fff;
    background-image:linear-gradient(45deg, rgba(255,255,255,.18) 25%, transparent 25%, transparent 50%, rgba(255,255,255,.18) 50%, rgba(255,255,255,.18) 75%, transparent 75%);
    background-size:16px 16px; animation:stripes 1s linear infinite;}
  @keyframes stripes{0%{background-position:0 0;}100%{background-position:16px 0;}}
  .bar.done{background:var(--green); color:#fff;}
  .bar .in-label{overflow:hidden; text-overflow:ellipsis;}
  .out-label{position:absolute; top:14px; font-size:11px; font-weight:600; color:var(--text-dim); white-space:nowrap; pointer-events:none;}
  /* 计划条：蓝色描边空心（上层）；实际条：绿色实心（下层），预计/实际颜色分明 */
  .lane{height:44px;}
  .bar{position:absolute; top:5px; height:15px; border-radius:8px; cursor:pointer; display:flex; align-items:center; padding:0 7px; font-size:10px; white-space:nowrap; overflow:hidden;}
  .bar.pending{background:#eaf2fd; border:1.5px solid var(--blue); color:#2563b0;}
  .bar.inprogress{background:#fff4e0; border:1.5px solid var(--amber); color:#a86a00;}
  .bar.done{background:#eaf2fd; border:1.5px solid #9dbde8; color:#5a7cae;}
  .bar .in-label{overflow:hidden; text-overflow:ellipsis;}
  /* 实际条 */
  .actbar{position:absolute; top:23px; height:15px; border-radius:8px; cursor:pointer; background:var(--green);
    display:flex; align-items:center; padding:0 7px; font-size:10px; color:#fff; white-space:nowrap; overflow:hidden;
    box-shadow:0 1px 2px rgba(52,180,111,.35);}
  .actbar.running{background:var(--amber); box-shadow:0 1px 2px rgba(245,166,35,.4);}
  .lane-tag{position:absolute; left:2px; font-size:8px; color:#aab4c0; pointer-events:none;}
  .lane-tag.plan{top:6px;}
  .lane-tag.act{top:24px;}
  .bar:hover, .actbar:hover{filter:brightness(1.05); outline:2px solid rgba(74,144,226,.4);}
  /* 被定位高亮的任务行 */
  tr.focus-row td{animation:focusFlash 1.6s ease;}
  @keyframes focusFlash{0%,40%{background:#fff3c4;}100%{background:transparent;}}

  .empty{padding:70px 20px; text-align:center; color:var(--text-dim);}
  .empty b{color:var(--text); display:block; font-size:16px; margin-bottom:6px;}

  /* ===== 弹窗 ===== */
  .overlay{position:fixed; inset:0; background:rgba(15,23,42,.45); display:flex; align-items:flex-start; justify-content:center; padding:40px 16px; overflow:auto; z-index:50;}
  .modal{background:#fff; border-radius:14px; width:100%; max-width:680px; padding:24px; box-shadow:0 10px 40px rgba(16,24,40,.2);}
  .modal h2{margin:0 0 4px; font-size:17px;}
  .modal .sub{color:var(--text-dim); font-size:12.5px; margin-bottom:16px;}
  .field{margin-bottom:12px;}
  .field label{display:block; font-size:12px; color:var(--text-dim); margin-bottom:4px; font-weight:600;}
  .field input{width:100%; background:#fff; border:1px solid var(--line); color:var(--text); padding:9px 11px; border-radius:8px; font-size:13.5px; font-family:'Noto Sans SC',sans-serif;}
  .field input:focus{outline:none; border-color:var(--blue); box-shadow:0 0 0 3px rgba(74,144,226,.12);}
  .row2{display:flex; gap:12px;}
  .row2 > *{flex:1;}
  .steps-table{width:100%; border-collapse:collapse; margin-top:6px;}
  .steps-table th{text-align:left; font-size:11px; color:var(--text-dim); padding:5px 6px; border-bottom:1px solid var(--line); font-weight:600;}
  .steps-table td{padding:6px; border-bottom:1px solid var(--line-2); vertical-align:middle;}
  .steps-table input[type=number]{width:66px; padding:6px; font-size:12.5px; border:1px solid var(--line); border-radius:6px;}
  .steps-table input[type=text]{padding:6px 8px; font-size:12.5px; width:100%; border:1px solid var(--line); border-radius:6px;}
  .swatch{width:12px; height:12px; border-radius:3px; display:inline-block; flex:none;}
  .modal-actions{display:flex; justify-content:flex-end; gap:8px; margin-top:18px;}
  .checkbox-row{display:flex; align-items:center; gap:7px; margin-bottom:14px;}
  .checkbox-row input{width:15px; height:15px;}
  .checkbox-row label{font-size:12.5px; color:var(--text-dim); margin:0;}
  .quickadd{display:flex; flex-wrap:wrap; gap:6px; margin:8px 0 6px;}
  .quickadd button{font-size:11.5px; padding:4px 11px; border-radius:14px; border:1px solid var(--line); background:#fff; color:var(--text-dim); cursor:pointer; display:inline-flex; align-items:center; gap:5px;}
  .quickadd button:hover{color:var(--text); border-color:#c4ccd6; background:#fafbfc;}
  .del-row{background:transparent; border:none; color:var(--red); cursor:pointer; font-size:16px; line-height:1;}
  .collapse-bar td{padding:0; border-bottom:1px solid var(--line-2);}
  .collapse-bar button{width:100%; text-align:left; background:#f4f7fb; border:none; color:#5b708c; font-size:11.5px; padding:7px 10px; cursor:pointer; font-weight:600;}
  .collapse-bar button:hover{background:#eaf1f9; color:var(--blue);}
  .plan-fill{display:flex; align-items:center; gap:9px; margin:-4px 0 12px; flex-wrap:wrap;}
  .plan-fill button{border:1px solid #bcd7f5; background:#eef4fc; color:var(--blue); border-radius:7px; font-size:11.5px; padding:4px 11px; cursor:pointer; font-weight:600;}
  .plan-fill button:hover{background:var(--blue); color:#fff;}
  .plan-fill .plan-note{font-size:11.5px; color:var(--text-dim);}
  .quickadd button.manage-tpl{border-style:dashed; color:var(--blue); border-color:#bcd7f5;}
  .quickadd button.manage-tpl:hover{background:#eef4fc;}
  .task-caret{flex:none; align-self:center; width:18px; height:18px; border-radius:5px; border:1px solid var(--line); background:#fff; color:var(--text-dim);
    font-size:10px; display:inline-flex; align-items:center; justify-content:center; cursor:pointer; transition:.12s;}
  .task-caret:hover{color:var(--blue); border-color:#bcd7f5; background:#eef4fc;}
  tr.task-row.task-collapsed td{border-bottom:1px solid var(--line);}

  .setup{max-width:640px; margin:60px auto; background:#fff; border:1px solid var(--line); border-radius:14px; padding:28px 30px; box-shadow:0 4px 16px rgba(16,24,40,.08);}
  .setup ol{padding-left:20px; line-height:1.9; font-size:13.5px;}
  .setup code{background:#f1f4f8; padding:1px 6px; border-radius:4px; font-family:'IBM Plex Mono',monospace; font-size:12px;}
  .setup a{color:var(--blue);}

  ::-webkit-scrollbar{height:10px; width:10px;}
  ::-webkit-scrollbar-track{background:#f1f4f8;}
  ::-webkit-scrollbar-thumb{background:#c8d1dc; border-radius:5px;}
  ::-webkit-scrollbar-thumb:hover{background:#b3bfcc;}
  .toast{position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:#1e2733; color:#fff; padding:10px 18px; border-radius:9px; font-size:12.5px; z-index:80; box-shadow:0 6px 20px rgba(16,24,40,.3);}
  /* 项目组折叠 + 计数 */
  .group-caret{display:inline-block; width:14px; color:var(--blue);}
  .group-count{font-size:11px; color:#9aa5b1; font-weight:400;}
  /* 折叠任务卡片 */

/* ---------- Supabase 存取（纯 REST + 定时轮询，不依赖长连接推送） ---------- */
const BOARD_ROW_URL = SUPABASE_URL.replace(/\/$/,'') + '/rest/v1/gantt_board';
/* 自适应鉴权：默认 apikey + Authorization 两个头都带；遇到 401/403 自动切换为仅 apikey 再试 */
let AUTH_MODE = 'both'; // 'both' | 'apikey'
function sbHeaders(){
  const h = {'apikey': SUPABASE_ANON_KEY, 'Content-Type':'application/json'};
  if(AUTH_MODE === 'both') h['Authorization'] = 'Bearer ' + SUPABASE_ANON_KEY;
  return h;
}
async function sbFetch(url, opts={}){
  const extra = opts.headers || {};
  let res = await fetch(url, {...opts, headers:{...sbHeaders(), ...extra}});
  if(res.status===401 || res.status===403){
    AUTH_MODE = (AUTH_MODE==='both') ? 'apikey' : 'both';
    res = await fetch(url, {...opts, headers:{...sbHeaders(), ...extra}});
  }
  return res;
}
let lastRemoteStamp = null;
let pollTimer = null;

function applyRemote(row){
  if(!row || !row.data) return;
  const data = row.data;
  if(data.templates && data.templates.length) state.templates = data.templates;
  state.entries = normalizeEntries(data.entries || []);
  if(data.title) state.title = data.title;
  lastRemoteStamp = row.updated_at || null;
}

async function fetchBoard(){
  const res = await sbFetch(BOARD_ROW_URL + '?id=eq.main&select=data,updated_at');
  if(!res.ok) throw new Error('HTTP '+res.status);
  const rows = await res.json();
  return rows[0] || null;
}

let lastError = '';
function friendlyError(e){
  const m = String(e && e.message || e);
  if(m.includes('404')) return '数据表未创建 → 去 Supabase 的 SQL Editor 运行建表 SQL（见文件底部注释）';
  if(m.includes('401')||m.includes('403')) return '密钥无效或权限不足 → 检查 Publishable key 是否完整、RLS 策略是否已建';
  if(m.includes('Failed to fetch')||m.includes('abort')||m.includes('Abort')) return '网络无法访问 supabase.co';
  return m;
}

async function pollOnce(silent){
  try{
    const row = await fetchBoard();
    const changed = row && row.updated_at !== lastRemoteStamp;

    connectionStatus = 'ok'; lastError='';

    else if(changed) render();
    else if(!silent) render();
    return true;

    else { connectionStatus='error'; loaded=true; render(); }
    if(!silent) showToast('❌ 无法连接云端：'+lastError);
    return false;
  }
}

/* ---------- 排程与聚合 ---------- */
/* 吃饭时间（北京时间，分钟表示）：排程会自动避开，工序不会被排进饭点 */
const MEAL_BREAKS = [ [12*60, 12*60+30, '午休'], [17*60+30, 18*60, '晚餐'] ];
/* 若 [t, t+dur分钟) 与某个饭点重叠，则把开始时间顺延到该饭点结束 */
function skipMealBreaks(t, dur){
  let cur = t;
  for(let guard=0; guard<10; guard++){
    const q = bjParts(cur);
    const m = q.h*60 + q.mi;
    let moved = false;
    for(const b of MEAL_BREAKS){
      if(m < b[1] && m + dur > b[0]){
        cur = bjMake(q.y, q.mo, q.da, Math.floor(b[1]/60), b[1]%60);
        moved = true; break;
      }
    }
    if(!moved) return cur;
  }
  return cur;
}

function computeSchedule(entry){
  const start0 = entryStartDate(entry);
  let cursorAbs = new Date(start0.getTime());
  let workMin = 0;
  const out = [];
  entry.steps.forEach(st=>{
    if(st.included===false) return;
    const dur = Math.max(1, st.minutes|0);
    const s0 = skipMealBreaks(cursorAbs, dur);
    const e0 = new Date(s0.getTime() + dur*60000);
    out.push({step:st, startMin:(s0 - start0)/60000, durMin:dur, startAbs:s0, endAbs:e0});
    cursorAbs = e0;
    workMin += dur;
  });
  return {segments:out, totalMin:workMin, endAbs: out.length ? out[out.length-1].endAbs : start0};
}
function entryStartDate(entry){ return new Date(entry.startISO); }
function entryPlannedEndDate(entry){ const r=computeSchedule(entry); return r.endAbs; }
function entryActualEndDate(entry){
  const now=new Date(); let latest=entryStartDate(entry);
  entry.steps.forEach(st=>{
    if(st.actualStart){
      const s=new Date(st.actualStart);
      const end = st.status==='done' ? new Date(s.getTime()+Math.max(1,st.actualMinutes||1)*60000) : now;
      if(end>latest) latest=end;
    }
  });
  return latest;
}
function pctDone(entry){
  const inc=entry.steps.filter(s=>s.included!==false);
  if(!inc.length) return 0;
  return Math.round(inc.filter(s=>s.status==='done').length/inc.length*100);
}
/* 任务级进度信息：当前工序 / 下一步 / 完成信息 */
function taskInfo(entry){
  const steps = entry.steps.filter(s=>s.included!==false);
  const done = steps.filter(s=>s.status==='done');
  const pct = steps.length ? Math.round(done.length/steps.length*100) : 0;
  const inProg = steps.find(s=>s.status==='in_progress');
  const firstPending = steps.find(s=>s.status==='pending');
  let currentText = null, nextLabel = null;
  if(inProg){
    currentText = '正在进行「'+inProg.label+'」';
    const idx = steps.indexOf(inProg);
    const nxt = steps.slice(idx+1).find(s=>s.status!=='done');
    nextLabel = nxt ? nxt.label : null;
  } else if(done.length && firstPending){
    currentText = '已完成到「'+done[done.length-1].label+'」';
    nextLabel = firstPending.label;
  } else if(firstPending){
    currentText = null;
    nextLabel = firstPending.label;
  }
  const finished = steps.length>0 && steps.every(s=>s.status==='done');
  let totalActual=0, finishTime=null;
  steps.forEach(s=>{
    if(s.actualStart && s.actualMinutes){
      totalActual+=s.actualMinutes;
      const e=new Date(new Date(s.actualStart).getTime()+s.actualMinutes*60000);
      if(!finishTime||e>finishTime) finishTime=e;
    }
  });
  const totalPlanned = steps.reduce((a,s)=>a+Math.max(1,s.minutes|0),0);
  return {pct, currentText, nextLabel, finished, anyRunning:!!inProg, totalActual, finishTime, totalPlanned, stepsDone:done.length, stepsTotal:steps.length};
}

function boardRange(){
  const now=new Date();
  if(state.entries.length===0){
    const s=bjMidnight(now);
    const e=new Date(s); e.setDate(e.getDate()+2);
    return {start:s, end:e};
  }
  let min=null, max=null;
  state.entries.forEach(en=>{
    const s=entryStartDate(en);
    const e1=entryPlannedEndDate(en), e2=entryActualEndDate(en);
    const e = e1>e2?e1:e2;
    if(!min||s<min) min=s;
    if(!max||e>max) max=e;
  });
  if(now<min) min=now;
  if(now>max) max=now;
  const start=bjMidnight(min);
  const end=new Date(bjMidnight(max).getTime()+86400000);
  if((end-start)<2*24*3600*1000){ end.setDate(start.getDate()+2); }
  return {start, end};
}

/* 排序键：已完成任务用实际完成时刻；未完成用最早的实际开始时间；没动过的用计划开始时间。
   这样看板从上到下就是"实际发生的先后顺序"。 */
function taskSortKey(entry){
  /* 严格按"实际"发生先后排：优先用最早的实际开始时间；
     从未开始的任务用计划开始时间兜底，排在有实际记录的之后（+一个大偏移保证靠后）。 */
  let earliest = null;
  entry.steps.forEach(s=>{
    if(s.included!==false && s.actualStart){
      const t = new Date(s.actualStart).getTime();
      if(earliest===null || t<earliest) earliest = t;
    }
  });
  if(earliest!==null) return earliest;
  return new Date(entry.startISO).getTime() + 1e15; // 未开始的排到所有已开始之后，内部再按计划时间
}

function groupByProject(entries){
  const groups={}; const order=[];
  entries.forEach(en=>{
    const key=(en.project||'').trim()||'（未分类项目）';
    if(!groups[key]){ groups[key]=[]; order.push(key); }
    groups[key].push(en);
  });
  const result = order.map(key=>({project:key, entries:groups[key].sort((a,b)=>taskSortKey(a)-taskSortKey(b))}));
  /* 项目组也按组内最早时间排，先发生的项目在上面 */
  result.sort((a,b)=>taskSortKey(a.entries[0])-taskSortKey(b.entries[0]));
  return result;
}

/* ---------- 统计（面板用） ---------- */
function computeStats(dateStr){
  const now=new Date();
  let actualMin=0, actualMinOfDone=0, plannedMinOfDone=0;
  let doneSteps=0, inProgressSteps=0;
  let plannedMinToday=0, totalStepsToday=0, doneStepsToday=0, tasksToday=0, tasksDoneToday=0;
  const perProject={};
  function proj(entry){
    const key=(entry.project||'').trim()||'（未分类）';
    if(!perProject[key]) perProject[key]={actual:0,planned:0,done:0,total:0};
    return perProject[key];
  }
  state.entries.forEach(entry=>{
    const included=entry.steps.filter(s=>s.included!==false);
    if(sameDay(entry.startISO, dateStr)){
      tasksToday++;
      const p=proj(entry);
      included.forEach(s=>{
        plannedMinToday+=Math.max(1,s.minutes|0);
        p.planned+=Math.max(1,s.minutes|0);
        p.total++; totalStepsToday++;
        if(s.status==='done'){ doneStepsToday++; p.done++; }
      });
      if(included.length && included.every(s=>s.status==='done')) tasksDoneToday++;
    }
    included.forEach(s=>{
      if(s.actualStart && sameDay(s.actualStart, dateStr)){
        const st=new Date(s.actualStart);
        const mins = s.status==='done' ? Math.max(1,s.actualMinutes||1) : Math.max(1,(now-st)/60000);
        actualMin+=mins; proj(entry).actual+=mins;
        if(s.status==='done'){ doneSteps++; actualMinOfDone+=mins; plannedMinOfDone+=Math.max(1,s.minutes|0); }
        if(s.status==='in_progress') inProgressSteps++;
      }
    });
  });
  const deviation = doneSteps ? Math.round(actualMinOfDone-plannedMinOfDone) : 0;
  const completion = totalStepsToday ? Math.round(doneStepsToday/totalStepsToday*100) : 0;
  return {actualMin, deviation, doneSteps, inProgressSteps, plannedMinToday, totalStepsToday, doneStepsToday, tasksToday, tasksDoneToday, completion, perProject};
}

/* ---------- 日报 / 周报 ---------- */
function projTaskName(entry){
  const p=(entry.project||'').trim();
  return (p? p+' / ' : '') + entry.name;
}
function buildDailyReport(dateStr){
  const s = computeStats(dateStr);
  const ps=dateStr.split('-'); const d = bjMake(+ps[0],+ps[1],+ps[2],0,0);
  const finishedToday=[], ongoing=[], notStarted=[];
  state.entries.forEach(entry=>{
    const info = taskInfo(entry);
    if(info.stepsTotal===0) return;
    if(info.finished){
      if(info.finishTime && localDateStr(info.finishTime)===dateStr) finishedToday.push({entry, info});
      return; // 更早完成的不再重复汇报
    }
    // 未完成任务：只要排产日期不晚于所选日期都纳入（含前几天遗留任务）
    if(localDateStr(entryStartDate(entry)) <= dateStr){
      if(info.pct===0 && !info.currentText) notStarted.push({entry, info});
      else ongoing.push({entry, info});
    }
  });

  const lines=[];
  lines.push('📋 生产日报 · '+fmtDay(d));
  lines.push('────────────');
  lines.push('⏱ 当日实际投入：'+fmtMin(s.actualMin)+(s.inProgressSteps?'（含 '+s.inProgressSteps+' 道进行中）':''));
  lines.push('✅ 当日完成任务 '+finishedToday.length+' 个；🔄 在办 '+ongoing.length+' 个；⏳ 待开始 '+notStarted.length+' 个');
  if(finishedToday.length){
    lines.push('');
    lines.push('【今日完成】');
    finishedToday.forEach(({entry,info})=>{
      const diff=info.totalActual-info.totalPlanned;
      const diffText = info.totalActual===0?'' : (diff===0?'，与预计持平':(diff>0?'，比预计多 '+fmtMin(diff):'，比预计省 '+fmtMin(-diff)));
      lines.push('· '+projTaskName(entry)+' —— '+(info.finishTime?fmtHM(info.finishTime)+' 完成，':'')+'实际总用时 '+fmtMin(info.totalActual)+'（预计 '+fmtMin(info.totalPlanned)+diffText+'）');
    });
  }
  if(ongoing.length){
    lines.push('');
    lines.push('【进行中（含前几日遗留）】');
    ongoing.forEach(({entry,info})=>{
      let t='· '+projTaskName(entry)+' —— 进度 '+info.pct+'%';
      if(info.currentText) t+='，'+info.currentText;
      if(info.nextLabel) t+='，下一步「'+info.nextLabel+'」';
      lines.push(t);
    });
  }
  if(notStarted.length){
    lines.push('');
    lines.push('【待开始】');
    notStarted.forEach(({entry,info})=>{
      lines.push('· '+projTaskName(entry)+'（'+fmtDay(entryStartDate(entry))+' '+fmtHM(entryStartDate(entry))+' 排产'+(info.nextLabel?'，首道工序「'+info.nextLabel+'」':'')+'）');
    });
  }
  return lines.join('\n');
}

function buildWeeklyReport(){
  const now=new Date();
  let monday=bjMidnight(now);
  monday=new Date(monday.getTime() - ((bjDow(now)+6)%7)*86400000);
  const nextMonday=new Date(monday.getTime()+7*86400000);
  const sunday=new Date(nextMonday.getTime()-1);

  let weekActualMin=0;
  state.entries.forEach(entry=>{
    entry.steps.filter(s=>s.included!==false).forEach(s=>{
      if(s.actualStart){
        const st=new Date(s.actualStart);
        if(st>=monday && st<nextMonday){
          weekActualMin += s.status==='done' ? Math.max(1,s.actualMinutes||1) : Math.max(1,(now-st)/60000);
        }
      }
    });
  });

  const finished=[], ongoing=[], notStarted=[];
  state.entries.forEach(entry=>{
    const info=taskInfo(entry);
    if(info.stepsTotal===0) return;
    if(info.finished){
      if(info.finishTime && info.finishTime>=monday && info.finishTime<nextMonday) finished.push({entry,info});
      return;
    }
    if(entryStartDate(entry) < nextMonday){
      if(info.pct===0 && !info.currentText) notStarted.push({entry,info});
      else ongoing.push({entry,info});
    }
  });

  const p=n=>String(n).padStart(2,'0');
  const mp=bjParts(monday), sp2=bjParts(sunday);
  const rangeText = p(mp.mo)+'/'+p(mp.da)+'–'+p(sp2.mo)+'/'+p(sp2.da);
  const lines=[];
  lines.push('📊 生产周报 · '+rangeText);
  lines.push('────────────');
  lines.push('⏱ 本周实际投入：'+fmtMin(weekActualMin));
  lines.push('✅ 完成任务 '+finished.length+' 个；🔄 进行中 '+ongoing.length+' 个；⏳ 待开始 '+notStarted.length+' 个');
  if(finished.length){
    lines.push('');
    lines.push('【本周完成】');
    finished.forEach(({entry,info})=>{
      lines.push('· '+projTaskName(entry)+' —— 实际总用时 '+fmtMin(info.totalActual)+'（预计 '+fmtMin(info.totalPlanned)+'）');
    });
  }
  if(ongoing.length){
    lines.push('');
    lines.push('【进行中】');
    ongoing.forEach(({entry,info})=>{
      let t='· '+projTaskName(entry)+' —— 进度 '+info.pct+'%';
      if(info.currentText) t+='，'+info.currentText;
      if(info.nextLabel) t+='，下一步「'+info.nextLabel+'」';
      lines.push(t);
    });
  }
  if(notStarted.length){
    lines.push('');
    lines.push('【待开始】');
    notStarted.forEach(({entry})=>{
      lines.push('· '+projTaskName(entry)+'（'+fmtDay(entryStartDate(entry))+' 排产）');
    });
  }
  return lines.join('\n');
}

        <div class="k-sub">${s.inProgressSteps? s.inProgressSteps+' 道工序进行中':'按实际开始/完成时间统计'}</div></div>
      <div class="kpi"><div class="k-label">当日计划工作量</div><div class="k-value">${fmtMin(s.plannedMinToday)}</div>
        <div class="k-sub">${s.tasksToday} 个任务排产</div></div>

/* ---------- 主渲染 ---------- */
function render(){
  if(NEEDS_SETUP){ renderSetupScreen(); return; }
  const app=document.getElementById('app');
  if(!loaded){ app.innerHTML='<div class="empty">连接云数据库中…</div>'; return; }
  if(state.title) document.title=state.title;

  const {start, end}=boardRange();
  const now=new Date();
  const todayStr=localDateStr(now);

  /* 分段带：往日整天折叠成窄条；展开日在"工作时段"模式下把夜间(0-8/20-24)也压成窄条 */
  const NIGHT_W = 26, WORK_S = 8, WORK_E = 20;
  const bands = [];          // x 映射用的时间带
  const dayInfos = [];       // 表头用的按天信息
  let c = new Date(start);
  while(c < end){
    const next = new Date(c.getTime()+86400000);
    const isPast = localDateStr(c) < todayStr;
    const collapsed = collapsePast && isPast;
    const dayBands = [];
    if(collapsed){
      dayBands.push({start:new Date(c), end:next, width:COLLAPSED_DAY_W, type:'collapsed'});
    } else if(workHoursOnly){
      const w1 = new Date(c.getTime()+WORK_S*3600000);
      const w2 = new Date(c.getTime()+WORK_E*3600000);
      dayBands.push({start:new Date(c), end:w1, width:NIGHT_W, type:'night'});
      dayBands.push({start:w1, end:w2, width:(WORK_E-WORK_S)*zoomPx, type:'work'});
      dayBands.push({start:w2, end:next, width:NIGHT_W, type:'night'});
    } else {
      dayBands.push({start:new Date(c), end:next, width:24*zoomPx, type:'work'});
    }
    dayBands.forEach(b=>bands.push(b));
    dayInfos.push({start:new Date(c), collapsed, bands:dayBands});
    c = next;
  }
  let acc=0; bands.forEach(b=>{ b.x=acc; acc+=b.width; });
  dayInfos.forEach(di=>{ di.x=di.bands[0].x; di.width=di.bands.reduce((a,b)=>a+b.width,0); });
  const timelineWidth=Math.max(600, acc);

  function timeToX(t){
    if(t<=bands[0].start) return 0;
    for(const b of bands){
      if(t<b.end){
        return b.x + ((t-b.start)/(b.end-b.start))*b.width;
      }
    }
    return acc;
  }

  const showNow = now>=start && now<=end;
  const nowX = timeToX(now);

  /* 表头（自绘，避免表格列对不齐） */
  let headHTML='';
  dayInfos.forEach(di=>{
    const off = dayOffInfo(di.start);
    const badge = off.off ? `<span class="day-badge ${off.type}">${off.label}</span>` : '';
    headHTML += `<div class="th-day ${di.collapsed?'collapsed':''}" style="left:${di.x}px; width:${di.width}px">${fmtDay(di.start)}${badge}${di.collapsed?' ▸':''}</div>`;
    if(!di.collapsed){
      const stepH = zoomPx>=45 ? 1 : 3;
      di.bands.forEach(b=>{
        if(b.type!=='work') return;
        const hours = Math.round((b.end-b.start)/3600000);
        const firstH = bjParts(b.start).h;
        for(let h=0; h<hours; h+=stepH){
          headHTML += `<div class="th-hour" style="left:${b.x+h*zoomPx}px">${String((firstH+h)%24).padStart(2,'0')}${zoomPx>=45?':00':''}</div>`;
        }
      });
    }
  });
  if(showNow) headHTML += `<span class="now-chip" style="left:${nowX}px">▼ ${fmtHM(now)}</span>`;

  /* 泳道底纹与网格（所有行复用同一段） */
  let deco='';
  dayInfos.forEach(di=>{
    deco += `<div class="gridline day" style="left:${di.x}px"></div>`;
    const off = dayOffInfo(di.start);
    if(off.off){
      deco += `<div class="shade dayoff-${off.type}" style="left:${di.x}px; width:${di.width}px"></div>`;
    }
    di.bands.forEach(b=>{
      if(b.type==='collapsed'){
        if(!off.off) deco += `<div class="shade collapsed" style="left:${b.x}px; width:${b.width}px"></div>`;
      } else if(b.type==='night'){
        deco += `<div class="shade night" style="left:${b.x}px; width:${b.width}px" title="夜间（已压缩）"></div>`;
      } else {
        const hours = Math.round((b.end-b.start)/3600000);
        const firstH = bjParts(b.start).h;
        for(let h=0; h<hours; h++){
          const hh=(firstH+h)%24;
          if(!off.off && !workHoursOnly && (hh<WORK_S||hh>=WORK_E)) deco += `<div class="shade" style="left:${b.x+h*zoomPx}px; width:${zoomPx}px"></div>`;
          deco += `<div class="gridline" style="left:${b.x+h*zoomPx}px"></div>`;
        }
        /* 饭点底纹（排程会自动避开这两段） */
        const p0=bjParts(b.start);
        MEAL_BREAKS.forEach(mb=>{
          const ms=bjMake(p0.y,p0.mo,p0.da, Math.floor(mb[0]/60), mb[0]%60);
          const me=bjMake(p0.y,p0.mo,p0.da, Math.floor(mb[1]/60), mb[1]%60);
          if(me>b.start && ms<b.end){
            const x1=timeToX(ms<b.start?b.start:ms), x2=timeToX(me>b.end?b.end:me);
            deco += `<div class="shade meal" style="left:${x1}px; width:${Math.max(2,x2-x1)}px" title="${mb[2]} ${String(Math.floor(mb[0]/60)).padStart(2,'0')}:${String(mb[0]%60).padStart(2,'0')}–${String(Math.floor(mb[1]/60)).padStart(2,'0')}:${String(mb[1]%60).padStart(2,'0')}（排程自动避开）"></div>`;
          }
        });
      }
    });
  });
  if(showNow) deco += `<div class="now-line" style="left:${nowX}px"></div>`;

  let rowsHTML='';
  const visibleEntries = state.entries.filter(passesFilter);
  if(state.entries.length===0){
    rowsHTML=`<tr><td class="namecol"></td><td class="timecol"></td><td class="timelinecell"><div class="empty" style="text-align:left;">
      <b>看板上还没有任务</b>点击右上角「＋新建任务」，把一个膜材批次排入流程。</div></td></tr>`;
  } else if(visibleEntries.length===0){
    rowsHTML=`<tr><td class="namecol"></td><td class="timecol"></td><td class="timelinecell"><div class="empty" style="text-align:left;">
      <b>没有符合筛选条件的任务</b>换个筛选/搜索条件，或点「全部」恢复。</div></td></tr>`;
  } else {
    const groups=groupByProject(visibleEntries);
    groups.forEach(group=>{
      const gCollapsed = collapsedGroups.has(group.project);
      const gCaret = gCollapsed ? '▸' : '▾';
      const gCount = group.entries.length;
      const gDone = group.entries.filter(e=>taskInfo(e).finished).length;
      rowsHTML += `<tr class="group-row" data-group="${escapeHTML(group.project)}"><td class="namecol"><div class="group-label" style="cursor:pointer;" onclick="__toggleGroup('${escapeHTML(group.project).replace(/'/g,"\\\\'")}')"><span class="group-caret">${gCaret}</span> ${escapeHTML(group.project)} <span class="group-count">${gDone}/${gCount} 任务</span></div></td><td class="timecol"></td><td></td></tr>`;
      if(gCollapsed) return;
      group.entries.forEach(entry=>{
        const {segments, totalMin}=computeSchedule(entry);
        const info=taskInfo(entry);
        const pct=info.pct;
        const sX=timeToX(entryStartDate(entry));
        const eX=timeToX(entryPlannedEndDate(entry));
        const sWidth=Math.max(10, eX-sX);
        const flashCls = entry.id===flashId ? ' flash-row' : '';

        const pStart=entryStartDate(entry), pEnd=entryPlannedEndDate(entry);
        const crossDay = localDateStr(pStart)!==localDateStr(pEnd);
        const planText = fmtHM(pStart)+'–'+(crossDay?fmtDay(pEnd).slice(0,5)+' ':'')+fmtHM(pEnd);

          <div class="tc-line"><span class="tc-k">计划</span>${planText}</div>
          ${info.finished&&info.finishTime?`<div class="tc-line done"><span class="tc-k">完成</span>${fmtHM(info.finishTime)}</div>`:''}
        </td>`;

        /* 一键推进：进行中→「完成当前」，否则→「开始下一道」；折叠状态下也能直接操作 */
        let quickBtn='';
        {
          const incl = entry.steps.filter(x=>x.included!==false);
          const running = incl.find(x=>x.status==='in_progress');
          const nextP = incl.find(x=>x.status==='pending');
          if(running){
            quickBtn = `<button class="mini-btn quick finish" onclick="__toggleStep('${entry.id}','${running.id}')">✔ 完成「${escapeHTML(running.label)}」</button>`;

            quickBtn = `<button class="mini-btn quick start" onclick="__toggleStep('${entry.id}','${nextP.id}')">▶ 开始「${escapeHTML(nextP.label)}」</button>`;
          }
        }

        let headLine='';
        if(info.finished){
          const diff=info.totalActual-info.totalPlanned;
          const diffText = info.totalActual===0?'' : (diff===0?'，与预计持平':(diff>0?`，比预计多 ${fmtMin(diff)}`:`，比预计省 ${fmtMin(-diff)}`));
          headLine = `<span class="done-badge">✔ 已完成</span> <span class="task-meta">${info.finishTime?fmtHM(info.finishTime)+' 完成 · ':''}实际总用时 ${fmtMin(info.totalActual)}（预计 ${fmtMin(info.totalPlanned)}${diffText}）</span>`;
        } else {
          let progressText = '';
          if(info.currentText) progressText = ' · '+info.currentText+(info.nextLabel?'，下一步「'+info.nextLabel+'」':'');
          headLine = `<span class="task-meta">${fmtDay(entryStartDate(entry))} ${fmtHM(entryStartDate(entry))} 开始 · 共${totalMin}分钟 · 完成 ${pct}%${progressText}</span>`;
        }

        const isCollapsed = collapsedTaskIds.has(entry.id);
        const inclCount = entry.steps.filter(s=>s.included!==false).length;
        const focusCls = entry.id===focusTaskId ? ' focus-row' : '';
        if(isCollapsed){
          /* 折叠态：整块收成一张紧凑单行卡片，右侧时间栏显示计划/完成时间 */
          const doneMark = info.finished ? '<span class="temp-badge" style="background:var(--green)">已完成</span>' : (info.anyRunning?'<span class="temp-badge" style="background:var(--amber)">进行中</span>':'');
          const collapsedTimeCol = `<td class="timecol">
            <div class="tc-line"><span class="tc-k">计划</span>${fmtHM(entryStartDate(entry))}–${fmtHM(entryPlannedEndDate(entry))}</div>
            ${info.finished&&info.finishTime?`<div class="tc-line done"><span class="tc-k">完成</span>${fmtHM(info.finishTime)}</div>`:`<div class="tc-line dim"><span class="tc-k">进度</span>${pct}%</div>`}
          </td>`;
          rowsHTML += `<tr class="task-row task-collapsed-card${flashCls}${focusCls}" data-task-id="${entry.id}">
            <td class="namecol">
              <div class="cc-line">
                <span class="task-caret" onclick="__toggleTask('${entry.id}')" title="展开工序">▸</span>
                <span class="task-name" style="cursor:pointer; flex:1;" onclick="__toggleTask('${entry.id}')">${escapeHTML(entry.name)}</span>
                ${entry.temporary?'<span class="temp-badge">临时</span>':''}
                ${doneMark}
                <span class="cc-pct">${pct}%</span>
              </div>
              <div class="progress-track" style="margin-top:5px;"><div class="progress-fill" style="width:${pct}%"></div></div>
            </td>
            ${collapsedTimeCol}
            <td class="timelinecell">
              <div class="lane task-lane" style="width:${timelineWidth}px">
                ${deco}
                <div class="summary-bar" style="left:${sX}px; width:${sWidth}px" onclick="__focusTask('${entry.id}')"><div class="summary-fill" style="width:${pct}%"></div></div>
              </div>
            </td>
          </tr>`;
          return;
        }
        rowsHTML += `<tr class="task-row${flashCls}${focusCls}" data-task-id="${entry.id}">
          <td class="namecol">
            <div class="task-head">
              <span class="task-caret" onclick="__toggleTask('${entry.id}')" title="折叠工序">▾</span>
              <span class="task-name" style="cursor:pointer;" onclick="__toggleTask('${entry.id}')" title="点击折叠工序">${escapeHTML(entry.name)}</span>
              ${entry.temporary?'<span class="temp-badge">临时</span>':''}
              ${headLine}
            </div>
            <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
            <div class="task-actions">
              ${quickBtn}
              <button class="mini-btn" onclick="__toggleTask('${entry.id}')">▾ 折叠工序</button>
              <button class="mini-btn" onclick="__editEntry('${entry.id}')">＋加工序 / 编辑</button>
              <button class="mini-btn" onclick="__duplicateEntry('${entry.id}')">复制到当前</button>
              <button class="mini-btn danger" onclick="__deleteEntry('${entry.id}')">删除</button>
            </div>
          </td>
          ${taskTimeCol}
          <td class="timelinecell">
            <div class="lane task-lane" style="width:${timelineWidth}px">
              ${deco}
              <div class="summary-bar" style="left:${sX}px; width:${sWidth}px"><div class="summary-fill" style="width:${pct}%"></div></div>
            </div>
          </td>
        </tr>`;

        segments.forEach(seg=>{
          const st=seg.step;
          const bStart=new Date(entryStartDate(entry).getTime()+seg.startMin*60000);
          const bEnd=new Date(bStart.getTime()+seg.durMin*60000);
          const x1=timeToX(bStart), x2=timeToX(bEnd);
          const left=x1, width=Math.max(10, x2-x1-1);
          const statusCls = st.status==='done'?'done':(st.status==='in_progress'?'inprogress':'pending');
          const labelText=`${escapeHTML(st.label)} ${seg.durMin}分`;
          const inBar = width >= (st.label.length*12+45);
          const barLabel = inBar?`<span class="in-label">${labelText}</span>`:'';
          const outLabel = inBar?'':`<span class="out-label" style="left:${left+width+7}px">${labelText}</span>`;

          let baseline='';
          let actualText='—'; let actualCls='dim';
          if(st.actualStart){
            const aS=new Date(st.actualStart);
            const aMins = st.status==='done'?Math.max(1,st.actualMinutes||1):Math.max(1,(now-aS)/60000);
            const aE=new Date(aS.getTime()+aMins*60000);
            const ax1=timeToX(aS), ax2=timeToX(aE);
            baseline=`<div class="actbar ${st.status==='in_progress'?'running':''}" style="left:${ax1}px; width:${Math.max(10,ax2-ax1)}px"
              onclick="event.stopPropagation(); __focusTask('${entry.id}')"
              title="实际：${fmtHM(aS)} 开始${st.status==='done'?'，用时 '+Math.round(aMins)+' 分钟':'，进行中'}">${(ax2-ax1)>=34?'<span class="in-label">'+escapeHTML(st.label)+'</span>':''}</div>`;
            if(st.status==='done'){
              actualText = fmtHM(aS)+'–'+fmtHM(aE);
              actualCls = 'done';
            } else {
              const over = aMins > st.minutes;
              actualText = fmtHM(aS)+'– 已'+Math.round(aMins)+'分'+(over?' ⚠':'');
              actualCls = over ? 'over' : 'prog';
            }
          }
          const stepTimeCol = `<td class="timecol" style="cursor:pointer;" onclick="__editTime('${entry.id}','${st.id}')" title="点击修改实际时间">
            <div class="tc-line"><span class="tc-k">预计</span>${fmtHM(bStart)}–${fmtHM(bEnd)}</div>
            <div class="tc-line ${actualCls}"><span class="tc-k">实际</span>${actualText}</div>
          </td>`;

          const statusIcon = st.status==='done'?'✓':(st.status==='in_progress'?'▸':'');
          const statusBtn = st.status==='pending'
            ? `<button class="step-btn start" onclick="__toggleStep('${entry.id}','${st.id}')">开始</button>`
            : (st.status==='in_progress'
              ? `<button class="step-btn finish" onclick="__toggleStep('${entry.id}','${st.id}')">完成</button>`
              : `<button class="step-btn undo" onclick="__toggleStep('${entry.id}','${st.id}')" title="点击撤销">✓</button>`);

          rowsHTML += `<tr class="step-row ${st.status==='done'?'is-done':''}${flashCls}">
            <td class="namecol">
              <div class="step-line">
                <span class="step-status-ic ${statusCls}" onclick="__toggleStep('${entry.id}','${st.id}')" title="点击切换：待开始 → 进行中 → 完成">${statusIcon}</span>
                <span class="step-label-text">${escapeHTML(st.label)}</span>
                <span class="step-min">${st.minutes}分</span>
                ${statusBtn}
              </div>
            </td>
            ${stepTimeCol}
            <td class="timelinecell">
              <div class="lane" style="width:${timelineWidth}px">
                ${deco}
                ${seg.startMin===0?'<span class="lane-tag plan">计划</span><span class="lane-tag act">实际</span>':''}
                <div class="bar ${statusCls}" style="left:${left}px; width:${width}px"
                  title="${escapeHTML(st.label)}：预计 ${fmtHM(bStart)} 开始，${seg.durMin} 分钟（点击定位任务）"
                  onclick="__focusTask('${entry.id}')">${barLabel}</div>
                ${outLabel}
                ${baseline}
              </div>
            </td>
          </tr>`;
        });
      });
    });
  }

  const dotClass = connectionStatus==='ok'?'ok':(connectionStatus==='error'?'err':(connectionStatus==='cache'?'warn':''));
  const statusText = connectionStatus==='ok' ? '已连接云端，多端实时同步中'
    : connectionStatus==='cache' ? '⚠ 与云端通道受阻'+(lastError?'：'+lastError:'：当前显示本地数据，改动可能未上传')
    : connectionStatus==='error' ? '❌ 云数据库连接失败'+(lastError?'：'+lastError:'')
    : '连接中…';

  document.getElementById('app').innerHTML = `
    <div class="topbar">
      <div class="brand">
        <h1>${escapeHTML(state.title || '生产计划甘特图看板')} <button class="title-edit-btn" onclick="__editTitle()" title="编辑标题">✎</button></h1>
      </div>
      <div class="toolbar">
        <div class="zoomset">
          <button class="${zoomPx===30?'active':''}" onclick="__setZoom(30)">按天</button>
          <button class="${zoomPx===60?'active':''}" onclick="__setZoom(60)">按时</button>
          <button class="${zoomPx===120?'active':''}" onclick="__setZoom(120)">宽视图</button>
          <button class="${zoomPx===240?'active':''}" onclick="__setZoom(240)">精细</button>
          <button onclick="__gotoNow()" title="滚动到当前时间">📍现在</button>
          <button onclick="__toggleWorkHours()" title="切换时间轴显示范围">${workHoursOnly?'⏰ 8-20点':'🌐 全天'}</button>
        </div>
        <button class="btn ${collapsePast?'toggled':''}" onclick="__toggleCollapse()">${collapsePast?'▸ 往日已折叠':'▾ 展开显示往日'}</button>
        <button class="btn" onclick="__openProjectList()">📁 项目列表</button>
        <button class="btn" onclick="__openTemplates()">默认工序库</button>
        <button class="btn primary" onclick="__openNew(false)">＋新建任务</button>
        <button class="btn" onclick="__openNew(true)">＋临时插单</button>
      </div>
    </div>
    <div class="subbar">
      <span class="status"><span class="dot ${dotClass}"></span>${statusText}</span>
      <button class="btn" style="padding:4px 11px; font-size:12px;" onclick="__forceRefresh()">🔄 手动同步</button>
      <span class="legend">
        <span class="lg"><i class="c-plan"></i>待开始</span>
        <span class="lg"><i class="c-prog"></i>进行中</span>
        <span class="lg"><i class="c-done"></i>已完成</span>
        <span class="lg"><i style="background:#ffe9d2; border:1px dashed #f0b477;"></i>午休/晚餐（排程自动避开）</span>
        <span class="lg" style="color:#9aa5b1;">点圆圈/色条：第1下开始，第2下完成 ✓；点「时间」栏文字可改实际时间</span>
      </span>
    </div>
    <div class="filterbar">
      <div class="filterchips">
        <button class="${filterMode==='all'?'active':''}" onclick="__setFilter('all')">全部</button>
        <button class="${filterMode==='today'?'active':''}" onclick="__setFilter('today')">今日</button>
        <button class="${filterMode==='running'?'active':''}" onclick="__setFilter('running')">进行中</button>
        <button class="${filterMode==='open'?'active':''}" onclick="__setFilter('open')">未完成</button>
      </div>
      <input type="search" id="searchBox" placeholder="🔍 搜索任务 / 项目…" value="${escapeHTML(searchQuery)}" oninput="__setSearch(this.value)">
      <span class="kbd-hint">快捷键：N 新建 · T 现在 · F 搜索</span>
      <span class="spacer2"></span>
      <button class="btn tiny" onclick="__exportBackup()">💾 备份</button>
      <button class="btn tiny" onclick="__importBackup()">📥 导入</button>
    </div>
    ${statsPanelHTML()}
    <div class="board-wrap">
      <div class="board-scroll" id="scrollArea">
        <table class="board">
          <thead><tr>
            <th class="corner namecol"></th>
            <th class="corner timecol" style="font-size:11px; color:var(--text-dim); font-weight:600;">时间（预计 / 实际）</th>
            <th style="padding:0;"><div class="tl-header" style="width:${timelineWidth}px">${headHTML}</div></th>
          </tr></thead>
          <tbody>${rowsHTML}</tbody>
        </table>
      </div>
    </div>
  `;
  flashId = null;

  const sa=document.getElementById('scrollArea');
  if(sa){
    if(!didAutoScroll && showNow){
      sa.scrollLeft=Math.max(0, nowX-250);
      didAutoScroll=true;
    } else {
      /* 刷新/同步后保持你滚动到的位置，不再被拽回 */
      sa.scrollLeft=savedScrollLeft;
      sa.scrollTop=savedScrollTop;
    }
    sa.addEventListener('scroll', ()=>{ savedScrollLeft=sa.scrollLeft; savedScrollTop=sa.scrollTop; }, {passive:true});
  }
  window.__nowX = nowX;
}

/* 📁 项目列表：列出各项目下的任务及完成时间，点击定位 */
window.__openProjectList = function(){
  const groups = groupByProject(state.entries);
  const body = groups.map(g=>{
    const rows = g.entries.map(en=>{
      const info = taskInfo(en);
      const status = info.finished ? `<span style="color:var(--green)">✓ ${info.finishTime?fmtHM(info.finishTime)+' 完成':'已完成'}</span>`
        : (info.anyRunning ? '<span style="color:var(--amber)">● 进行中</span>' : `<span style="color:#9aa5b1">待开始 · 计划 ${fmtHM(entryStartDate(en))}</span>`);
      return `<div class="pl-task" onclick="__closeProjectList(); __focusTask('${en.id}')">
        <span class="pl-name">${escapeHTML(en.name)}</span>
        <span class="pl-status">${status}</span>
        <span class="pl-pct">${info.pct}%</span>
      </div>`;
    }).join('');
    const gDone = g.entries.filter(e=>taskInfo(e).finished).length;
    return `<div class="pl-group"><div class="pl-gtitle">${escapeHTML(g.project)} <span class="group-count">${gDone}/${g.entries.length}</span></div>${rows}</div>`;
  }).join('') || '<div style="color:#9aa5b1; padding:20px;">还没有任务</div>';

  const overlay=document.createElement('div');
  overlay.className='overlay'; overlay.id='projListOverlay';
  overlay.innerHTML=`<div class="modal" style="max-width:560px;">
    <h2>📁 项目列表</h2>
    <div class="sub">按项目查看任务与完成时间，点任意任务即定位到看板对应位置。</div>
    <input type="search" id="plSearch" placeholder="🔍 搜索任务 / 项目…" style="width:100%; border:1px solid var(--line); border-radius:8px; padding:9px 11px; font-size:13px; margin-bottom:10px;">
    <div class="pl-body" id="plBody">${body}</div>
    <div class="modal-actions"><button class="btn" onclick="__closeProjectList()">关闭</button></div>
  </div>`;
  document.body.appendChild(overlay);
  overlay.addEventListener('click',(e)=>{ if(e.target===overlay) __closeProjectList(); });
  const sb=document.getElementById('plSearch');
  sb.addEventListener('input',()=>{
    const q=sb.value.toLowerCase();
    document.querySelectorAll('#plBody .pl-group').forEach(g=>{
      let any=false;
      g.querySelectorAll('.pl-task').forEach(t=>{
        const hit=t.textContent.toLowerCase().includes(q);
        t.style.display=hit?'':'none'; if(hit) any=true;
      });
      const gt=g.querySelector('.pl-gtitle');
      const gHit=gt.textContent.toLowerCase().includes(q);
      if(gHit) g.querySelectorAll('.pl-task').forEach(t=>t.style.display='');
      g.style.display=(any||gHit)?'':'none';
    });
  });
  setTimeout(()=>sb.focus(),50);
};
