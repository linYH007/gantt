window.__importBackup=function(){
  let inp=document.getElementById('importFileInput');
  if(!inp){
    inp=document.createElement('input');
    inp.type='file'; inp.accept='.json,application/json'; inp.id='importFileInput'; inp.style.display='none';
    document.body.appendChild(inp);
    inp.addEventListener('change', ()=>{
      const f=inp.files && inp.files[0];
      inp.value='';
      if(!f) return;
      const r=new FileReader();
      r.onload=async ()=>{
        try{
          const data=JSON.parse(r.result);
          if(!data || !Array.isArray(data.entries)) throw new Error('文件格式不对');
          if(!confirm('将用备份（'+data.entries.length+' 个任务）覆盖当前云端数据，确定？（可撤销）')) return;
          const importUndo=snapshotForUndo('导入备份前的数据',true);
          state.entries=normalizeEntries(data.entries);
          taskCollapseOverrides.clear();
          groupCollapseOverrides.clear();
          if(Array.isArray(data.templates)) state.templates=data.templates;
          if(Array.isArray(data.meals)) state.meals=data.meals;
          if(Array.isArray(data.people)) state.people=data.people.map(n=>String(n||'').trim()).filter(Boolean);
          if(typeof data.title==='string') state.title=data.title;
          const saved=await saveBoard();
          showUndoToast(saved?'备份已导入并同步云端。':'备份已导入到本页，待手动同步。',importUndo);
        }catch(err){ showToast('导入失败：'+err.message); }
      };
      r.readAsText(f);
    });
  }
  inp.click();
};

function snapshotForUndo(label, fullState=false){
  return {
    snapshot:JSON.stringify(fullState?state:state.entries),
    label,
    fullState,
    epoch:mutationEpoch+1
  };
}
function showUndoToast(msg, undo){
  if(!undo || undo.epoch!==mutationEpoch){ showToast(msg); return; }
  if(activeUndoToast) activeUndoToast.remove();
  const t=document.createElement('div');
  t.className='toast';
  t.innerHTML = escapeHTML(msg)+' <button class="undo-btn" id="undoBtn">撤销</button>';
  document.body.appendChild(t);
  activeUndoToast=t;
  const timer=setTimeout(()=>{ t.remove(); if(activeUndoToast===t) activeUndoToast=null; }, 6000);
  t.querySelector('#undoBtn').onclick=async ()=>{
    clearTimeout(timer); t.remove(); if(activeUndoToast===t) activeUndoToast=null;
    if(undo.epoch!==mutationEpoch){ showToast('后续已有新改动，这一步不能再撤销。'); return; }
    if(undo.fullState){
      state=JSON.parse(undo.snapshot);
      state.entries=normalizeEntries(state.entries||[]);
      if(!Array.isArray(state.templates)) state.templates=STEP_TEMPLATES_DEFAULT.map(s=>({...s}));
    } else {
      state.entries=normalizeEntries(JSON.parse(undo.snapshot));
    }
    taskCollapseOverrides.clear();
    groupCollapseOverrides.clear();
    await saveBoard();
    showToast('已撤销：'+undo.label);
  };
}

/* ⚡ 按计划一键完成该任务剩余全部工序（补录场景），可撤销 */
window.__finishAllPlanned = async function(id){
  const entry=state.entries.find(e=>e.id===id);
  if(!entry) return;
  const {segments}=computeSchedule(entry);
  const remain=segments.filter(g=>g.step.status!=='done');
  if(!remain.length){ showToast('该任务已全部完成。'); return; }
  if(!confirm('将按计划时间补录并完成剩余 '+remain.length+' 道工序，确定？（可撤销）')) return;
  const finishUndo=snapshotForUndo('批量完成「'+entry.name+'」剩余工序');
  const base=entryStartDate(entry).getTime();
  remain.forEach(g=>{
    g.step.actualStart=new Date(base+g.startMin*60000).toISOString();
    g.step.actualMinutes=g.durMin;
    g.step.status='done';
  });
  taskCollapseOverrides.delete(id);
  flashId=id;
  await saveBoard();
  showUndoToast('已按计划完成 '+remain.length+' 道工序。',finishUndo);
};

    <td><input type="text" class="stepLabel" data-step-idx="${idx}" placeholder="工序名称" value="${escapeHTML(s.label)}"></td>
    <td class="duration-cell"><input type="number" min="1" class="stepMinutes" data-step-idx="${idx}" value="${s.minutes}"> 分</td>
    <td class="col-status">${s.status==='done'?'<span style="color:var(--green); font-size:11px;">已完成</span>':(s.status==='in_progress'?'<span style="color:var(--amber); font-size:11px;">进行中</span>':'')}</td>
    <td class="reorder-cell"><button type="button" class="drag-handle" data-drag-idx="${idx}" aria-label="拖动调整工序顺序" title="拖动排序，也可用上下方向键">↕</button></td>
    <td><button type="button" class="del-row" data-del-idx="${idx}" title="删除此工序">×</button></td>
  </tr>`;
}

function openModal(draft){
  const overlay=document.createElement('div');
  overlay.className='overlay'; overlay.id='modalOverlay';
  let workingSteps=draft.steps.map(s=>({...s}));
  let activeStepDragCleanup=null;
  let collapsedCount=0;   // 折叠隐藏的前 N 道工序（工序较多时自动折叠，方便编辑新工序）
  let userExpanded=false; // 用户手动展开后，添加新工序时不再自动折叠

  const d=new Date(draft.startISO);
  const dateVal=localDateStr(d);
  const timeVal=_bjHMFmt.format(d);

  /* 项目名候选（已有项目一键选）+ 新建时默认带上上次用过的项目 */
  const projNames=[...new Set(state.entries.map(e=>(e.project||'').trim()).filter(Boolean))];
  const projOptions=projNames.map(n=>`<option value="${escapeHTML(n)}"></option>`).join('');
  /* 负责人候选：已知人员列表；新建任务时若顶部正看某个人，默认带上该人，省去每次选 */
  if(!editingId && (draft.owner===undefined || draft.owner==='') && activePerson!=='全部' && activePerson!==OWNER_UNASSIGNED){
    draft.owner=activePerson;
  }
  const ownerOptions=allPeople().map(n=>`<option value="${escapeHTML(n)}"></option>`).join('');
  if(!editingId && !draft.project){
    try{ draft.project=localStorage.getItem('gantt:lastProject')||''; }catch(_e){}
  }

  /* 每超过 5 道工序就多折叠一批：保持最多 5 行展开（6~10道折前5，11~15道折前10，以此类推） */
  function autoCollapseCount(){
    return workingSteps.length>5 ? Math.floor((workingSteps.length-1)/5)*5 : 0;
  }
  function stepsTableHTML(){
    collapsedCount=Math.min(collapsedCount, autoCollapseCount());
    let html='';
    if(collapsedCount>0){
      const names=workingSteps.slice(0,collapsedCount).map(s=>(s.label||'').trim()||'未命名').slice(0,3).join('、');
      html+=`<tr class="collapse-bar"><td colspan="7"><button type="button" id="expandSteps">▸ 已折叠前 ${collapsedCount} 道工序（${escapeHTML(names)}${collapsedCount>3?' 等':''}）— 点击展开</button></td></tr>`;
    } else if(workingSteps.length>5){
      html+=`<tr class="collapse-bar"><td colspan="7"><button type="button" id="collapseSteps">▾ 折叠前 ${autoCollapseCount()} 道工序，方便编辑下方新工序</button></td></tr>`;
    }
    html+=workingSteps.map((s,idx)=> idx<collapsedCount ? '' : stepRowHTML(s,idx)).join('');
    return html;
  }
  function quickAddHTML(){
    return state.templates.map((t,i)=>`<button type="button" data-quick-idx="${i}"><span class="swatch" style="background:${t.color}"></span>${escapeHTML(t.label)}</button>`).join('')
      + `<button type="button" id="addBlankStep">＋ 自定义工序</button>`
      + `<button type="button" class="manage-tpl" id="manageTemplates" title="修改这些快速选择标签的名称和默认时长">✎ 修改默认工序</button>`;
  }

  overlay.innerHTML=`
    <div class="modal">
      <h2>${editingId?'编辑任务 / 添加工序':(draft.temporary?'添加临时插单任务':'新建任务')}</h2>
      <div class="sub">点下方灰色标签可随时往任务里追加工序（已完成的工序不受影响）。</div>
      <div class="row2">
        <div class="field"><label>所属项目</label><input type="text" id="fProject" list="projList" placeholder="例如：B客户镜面" value="${escapeHTML(draft.project||'')}"><datalist id="projList">${projOptions}</datalist></div>
        <div class="field"><label>任务名称</label><input type="text" id="fName" placeholder="例如：二次贴膜 * 6片" value="${escapeHTML(draft.name)}"></div>
      </div>
      <div class="row2">
        <div class="field"><label>负责人</label><input type="text" id="fOwner" list="ownerList" placeholder="例如：张三（可留空＝未分配）" value="${escapeHTML(draft.owner||'')}"><datalist id="ownerList">${ownerOptions}</datalist></div>
        <div class="field"></div>
      </div>
      <div class="row2">
        <div class="field"><label>开始日期</label><input type="date" id="fDate" value="${dateVal}"></div>
        <div class="field"><label>开始时间</label><input type="time" id="fTime" value="${timeVal}"></div>
      </div>
      <div id="dateHint"></div>
      <div class="checkbox-row">
        <input type="checkbox" id="fTemp" ${draft.temporary?'checked':''}>
        <label for="fTemp">标记为临时 / 插单任务</label>
      </div>
      <label style="display:block; font-size:12px; color:var(--text-dim); margin-bottom:4px; font-weight:600;">工序（点击标签快速添加）</label>
      <div class="quickadd" id="quickAddArea">${quickAddHTML()}</div>
      <table class="steps-table">
        <thead><tr><th></th><th></th><th>工序名称</th><th>预计时长</th><th class="col-status">状态</th><th>拖拽</th><th></th></tr></thead>
        <tbody id="stepsBody">${stepsTableHTML()}</tbody>
      </table>
      <div class="modal-actions">
        ${editingId?'<button class="btn" id="fDelete" style="margin-right:auto; color:var(--red);">🗑 删除任务</button>':''}
        <button class="btn" onclick="__closeModal()">取消</button>
        <button class="btn primary" id="fSave">保存</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  overlay.addEventListener('click',(e)=>{ if(e.target===overlay) __closeModal(); });

  /* 编辑已有任务时：可直接在弹窗里删除整个任务 */
  const fDelete=document.getElementById('fDelete');
  if(fDelete) fDelete.onclick=async ()=>{
    const target=state.entries.find(e=>e.id===editingId);
    if(!confirm('确定要删除整个任务及其所有工序记录吗？（删除后可撤销）')) return;
    const deleteUndo=snapshotForUndo('删除「'+(target?target.name:'任务')+'」');
    const idToDel=editingId;
    state.entries=state.entries.filter(e=>e.id!==idToDel);
    taskCollapseOverrides.delete(idToDel);
    __closeModal();
    await saveBoard();
    showUndoToast('任务已删除。',deleteUndo);
  };

  /* 节假日/周末提示：所选开始日期是休息日时给出顺延按钮 */
  function updateDateHint(){
    const box=document.getElementById('dateHint');
    const v=document.getElementById('fDate').value;
    if(!box || !v){ if(box) box.innerHTML=''; return; }
    const d=parseBJ(v+'T00:00');
    const off=dayOffInfo(d);
    if(off.off){
      box.innerHTML = `<div class="date-hint">⚠ 所选日期是 <b>${off.label}</b>${off.type==='holiday'?'（法定节假日）':'（周末）'}，确定要安排吗？
        <button type="button" id="bumpDate">顺延到下个工作日</button></div>`;
      document.getElementById('bumpDate').onclick=()=>{
        document.getElementById('fDate').value = localDateStr(nextWorkday(d));
        updateDateHint();
      };
    } else {
      box.innerHTML='';
    }
  }
  document.getElementById('fDate').addEventListener('change', updateDateHint);
  updateDateHint();

  /* 键盘便捷：Ctrl/Cmd+Enter 保存，Esc 关闭；普通回车留给输入法。 */
  overlay.addEventListener('keydown', (e)=>{
    if(e.key==='Escape'){ e.preventDefault(); __closeModal(); }
    else if(e.key==='Enter' && (e.ctrlKey||e.metaKey)){
      e.preventDefault(); document.getElementById('fSave').click();
    }
  });
  const nameInput=document.getElementById('fName');
  if(nameInput && !nameInput.value) nameInput.focus(); else if(nameInput) nameInput.select();

  function rerenderStepsBody(){
    document.getElementById('stepsBody').innerHTML=stepsTableHTML();
    bindStepRowEvents();
  }
  /* 关键修复：把表格里正在输入的内容实时写回 workingSteps，
     这样添加/删除工序触发重新渲染时，未保存的编辑不会丢失 */
  function syncStepsFromDOM(){
    const body=document.getElementById('stepsBody');
    if(!body) return;
    body.querySelectorAll('.stepInclude').forEach(box=>{ const i=parseInt(box.dataset.stepIdx,10); if(workingSteps[i]) workingSteps[i].included=box.checked; });
    body.querySelectorAll('.stepLabel').forEach(inp=>{ const i=parseInt(inp.dataset.stepIdx,10); if(workingSteps[i]) workingSteps[i].label=inp.value; });
    body.querySelectorAll('.stepMinutes').forEach(inp=>{ const i=parseInt(inp.dataset.stepIdx,10); if(!workingSteps[i]) return; const v=parseInt(inp.value,10); if(!isNaN(v)&&v>=1) workingSteps[i].minutes=v; });
  }
  /* 事件委托绑在 tbody 上，重渲染 innerHTML 后依然有效 */
  document.getElementById('stepsBody').addEventListener('input', syncStepsFromDOM);
  document.getElementById('stepsBody').addEventListener('change', syncStepsFromDOM);

  function moveStep(fromIndex, toIndex){
    syncStepsFromDOM();
    const minIndex=Math.min(collapsedCount, Math.max(0,workingSteps.length-1));
    toIndex=Math.max(minIndex, Math.min(toIndex, workingSteps.length-1));
    if(fromIndex===toIndex || !workingSteps[fromIndex]) return;
    const moved=workingSteps.splice(fromIndex,1)[0];
    workingSteps.splice(toIndex,0,moved);
    rerenderStepsBody();
    const handle=document.querySelector(`#stepsBody .drag-handle[data-drag-idx="${toIndex}"]`);
    if(handle){ handle.scrollIntoView({block:'nearest'}); handle.focus(); }
  }
  function bindDragHandle(handle){
    handle.onkeydown=(e)=>{
      const fromIndex=parseInt(handle.dataset.dragIdx,10);
      if(e.key==='ArrowUp' && fromIndex>collapsedCount){ e.preventDefault(); moveStep(fromIndex,fromIndex-1); }
      else if(e.key==='ArrowDown' && fromIndex<workingSteps.length-1){ e.preventDefault(); moveStep(fromIndex,fromIndex+1); }
    };
    handle.onpointerdown=(e)=>{
      if(e.isPrimary===false) return;
      if(e.pointerType==='mouse' && e.button!==0) return;
      if(activeStepDragCleanup) activeStepDragCleanup();
      e.preventDefault();
      handle.focus();
      syncStepsFromDOM();
      const body=document.getElementById('stepsBody');
      const sourceIndex=parseInt(handle.dataset.dragIdx,10);
      const sourceRow=handle.closest('tr[data-step-idx]');
      const pointerId=e.pointerId;
      const startX=e.clientX, startY=e.clientY;
      let dragging=false;
      let dropBoundary=sourceIndex;
      let cleaned=false;

      function clearDropMarks(){
        body.querySelectorAll('.step-drop-before,.step-drop-after').forEach(row=>row.classList.remove('step-drop-before','step-drop-after'));
      }
      function cleanup(){
        if(cleaned) return;
        cleaned=true;
        clearDropMarks();
        sourceRow.classList.remove('step-dragging');
        handle.setAttribute('aria-grabbed','false');
        window.removeEventListener('pointermove', onMove);
        window.removeEventListener('pointerup', onUp);
        window.removeEventListener('pointercancel', onCancel);
        window.removeEventListener('blur', cleanup);
        handle.removeEventListener('lostpointercapture', onLostCapture);
        if(activeStepDragCleanup===cleanup) activeStepDragCleanup=null;
        try{ if(handle.hasPointerCapture(pointerId)) handle.releasePointerCapture(pointerId); }catch(_e){}
      }
      function onMove(ev){
        if(ev.pointerId!==pointerId) return;
        if(!dragging && Math.hypot(ev.clientX-startX,ev.clientY-startY)<5) return;
        dragging=true;
        ev.preventDefault();
        sourceRow.classList.add('step-dragging');
        handle.setAttribute('aria-grabbed','true');
        const modal=overlay.querySelector('.modal');
        const scroller=modal && modal.scrollHeight>modal.clientHeight+1 ? modal : overlay;
        const scrollRect=scroller.getBoundingClientRect();
        const edge=48;
        if(ev.clientY<Math.max(0,scrollRect.top)+edge) scroller.scrollTop-=14;
        else if(ev.clientY>Math.min(window.innerHeight,scrollRect.bottom)-edge) scroller.scrollTop+=14;
        const hit=document.elementFromPoint(ev.clientX,ev.clientY);
        const row=hit && hit.closest ? hit.closest('#stepsBody tr[data-step-idx]') : null;
        if(!row || !body.contains(row)) return;
        const targetIndex=parseInt(row.dataset.stepIdx,10);
        const after=ev.clientY > row.getBoundingClientRect().top + row.getBoundingClientRect().height/2;
        dropBoundary=targetIndex+(after?1:0);
        clearDropMarks();
        row.classList.add(after?'step-drop-after':'step-drop-before');
      }
      function onUp(ev){
        if(ev.pointerId!==pointerId) return;
        const finalIndex=sourceIndex<dropBoundary ? dropBoundary-1 : dropBoundary;
        cleanup();
        if(dragging && document.body.contains(overlay)) moveStep(sourceIndex,finalIndex);
      }
      function onCancel(ev){ if(ev.pointerId===pointerId) cleanup(); }
      function onLostCapture(ev){ if(ev.pointerId===pointerId) cleanup(); }
      activeStepDragCleanup=cleanup;
      window.addEventListener('pointermove', onMove, {passive:false});
      window.addEventListener('pointerup', onUp);
      window.addEventListener('pointercancel', onCancel);
      window.addEventListener('blur', cleanup);
      handle.addEventListener('lostpointercapture', onLostCapture);
      try{ handle.setPointerCapture(pointerId); }catch(_e){}
    };
  }

  function bindStepRowEvents(){
    document.querySelectorAll('#stepsBody .del-row').forEach(btn=>{
      btn.onclick=()=>{
        syncStepsFromDOM();
        workingSteps.splice(parseInt(btn.dataset.delIdx,10),1);
        rerenderStepsBody();
      };
    });
    const ex=document.getElementById('expandSteps');
    if(ex) ex.onclick=()=>{ syncStepsFromDOM(); userExpanded=true; collapsedCount=0; rerenderStepsBody(); };
    const co=document.getElementById('collapseSteps');
    if(co) co.onclick=()=>{ syncStepsFromDOM(); userExpanded=false; collapsedCount=autoCollapseCount(); rerenderStepsBody(); };
    document.querySelectorAll('#stepsBody .drag-handle').forEach(bindDragHandle);
  }
  bindStepRowEvents();

  /* 添加新工序：先同步已输入内容 → 追加 → 每超过 5 道自动多折叠一批 → 滚到新行并聚焦 */
  function addStep(step, focusLabel){
    syncStepsFromDOM();
    workingSteps.push(step);
    if(!userExpanded) collapsedCount=autoCollapseCount();
    rerenderStepsBody();
    const rows=document.querySelectorAll('#stepsBody tr[data-step-idx]');
    const last=rows[rows.length-1];
    if(last){
      last.scrollIntoView({block:'nearest'});
      if(focusLabel){ const inp=last.querySelector('.stepLabel'); if(inp) inp.focus(); }
    }
  }
  function bindQuickAdd(){
    document.querySelectorAll('#quickAddArea button[data-quick-idx]').forEach(btn=>{
      btn.onclick=()=>addStep(freshStepFromTemplate(state.templates[parseInt(btn.dataset.quickIdx,10)]), false);
    });
    document.getElementById('addBlankStep').onclick=()=>addStep(blankStep(), true);
    const mg=document.getElementById('manageTemplates');
    if(mg) mg.onclick=()=>__openTemplates();
  }
  bindQuickAdd();

  /* 默认工序库保存后，实时刷新本弹窗的快速选择标签（弹窗关闭后监听自动清理） */
  const onTplUpdated=()=>{
    if(!document.body.contains(overlay)){ document.removeEventListener('gantt-templates-updated', onTplUpdated); return; }
    const area=document.getElementById('quickAddArea');
    if(area){ area.innerHTML=quickAddHTML(); bindQuickAdd(); }
  };
  document.addEventListener('gantt-templates-updated', onTplUpdated);

  document.getElementById('fSave').onclick=async ()=>{
    const project=document.getElementById('fProject').value.trim();
    try{ if(project) localStorage.setItem('gantt:lastProject', project); }catch(_e){}
    const name=document.getElementById('fName').value.trim();
    if(!name){ showToast('请输入任务名称。'); return; }
    const ownerEl=document.getElementById('fOwner');
    const owner=ownerEl?ownerEl.value.trim():'';
    if(owner){ rememberPerson(owner); }   // 输入的新名字自动加入人员名单
    const date=document.getElementById('fDate').value;
    const time=document.getElementById('fTime').value||'00:00';
    const startISO=parseBJ(`${date}T${time}`).toISOString();
    const temporary=document.getElementById('fTemp').checked;

    syncStepsFromDOM(); // 折叠中的行也保留其最后一次输入的值
    const steps=workingSteps.map(s=>({
      ...s,
      included: s.included!==false,
      label: (s.label||'').trim()||'未命名工序',
      minutes: Math.max(1, parseInt(s.minutes,10)||1),
    })).filter(s=>s.label);

    if(editingId){
      const entry=state.entries.find(e=>e.id===editingId);
      Object.assign(entry, {project, name, owner, startISO, temporary, steps});
      ensureCollapseOverrideDate();
      taskCollapseOverrides.set(editingId,false); // 编辑后自动展开，方便查看改动
      flashId = editingId;
    } else {
      const newId = uid();
      state.entries.push({id:newId, project, name, owner, startISO, temporary, steps});
      ensureCollapseOverrideDate();
      taskCollapseOverrides.set(newId,false);
      flashId = newId;
    }
    const saved=await saveBoard();
    __closeModal();
    showToast(saved?'已保存到云端。':'任务已保留在本页，待手动同步。');
  };
}
window.__closeModal = function(){
  const o=document.getElementById('modalOverlay');
  if(o) o.remove();
  editingId=null;
};

/* ---------- 默认工序库 ---------- */
window.__openTemplates = function(){
  const overlay=document.createElement('div');
  overlay.className='overlay'; overlay.id='templatesOverlay';
  let working=state.templates.map(t=>({...t}));

  function rowsHTML(){
    return working.map((t,idx)=>`<tr>
      <td><span class="swatch" style="background:${t.color}"></span></td>
      <td><input type="text" class="tLabel" data-idx="${idx}" value="${escapeHTML(t.label)}"></td>
      <td class="duration-cell"><input type="number" min="1" class="tMinutes" data-idx="${idx}" value="${t.minutes}"> 分</td>
      <td><button type="button" class="del-row" data-del-idx="${idx}">×</button></td>
    </tr>`).join('');
  }

  overlay.innerHTML=`
    <div class="modal">
      <h2>默认工序库</h2>
      <div class="sub">用于新建任务时一键添加，修改这里不影响看板上已排好的任务。</div>
      <table class="steps-table">
        <thead><tr><th></th><th>工序名称</th><th>默认时长</th><th></th></tr></thead>
        <tbody id="tBody">${rowsHTML()}</tbody>
      </table>
      <div style="margin-top:8px;"><button type="button" class="btn" id="addTemplate">＋ 添加模板工序</button></div>
      <div class="modal-actions">
        <button class="btn" onclick="__closeTemplates()">取消</button>
        <button class="btn primary" id="tSave">保存模板</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  overlay.addEventListener('click',(e)=>{ if(e.target===overlay) __closeTemplates(); });
  overlay.addEventListener('keydown',(e)=>{
    if(e.key==='Escape'){ e.preventDefault(); __closeTemplates(); }
    else if(e.key==='Enter' && (e.ctrlKey||e.metaKey)){ e.preventDefault(); document.getElementById('tSave').click(); }
  });

  function rerender(){ document.getElementById('tBody').innerHTML=rowsHTML(); bind(); }
  /* 同样的修复：先把正在输入的内容写回 working，再重渲染，避免编辑丢失 */
  function syncFromDOM(){
    const body=document.getElementById('tBody');
    if(!body) return;
    body.querySelectorAll('.tLabel').forEach(inp=>{ const i=parseInt(inp.dataset.idx,10); if(working[i]) working[i].label=inp.value; });
    body.querySelectorAll('.tMinutes').forEach(inp=>{ const i=parseInt(inp.dataset.idx,10); if(!working[i]) return; const v=parseInt(inp.value,10); if(!isNaN(v)&&v>=1) working[i].minutes=v; });
  }
  document.getElementById('tBody').addEventListener('input', syncFromDOM);
  function bind(){
    document.querySelectorAll('#tBody .del-row').forEach(btn=>{
      btn.onclick=()=>{ syncFromDOM(); working.splice(parseInt(btn.dataset.delIdx,10),1); rerender(); };
    });
  }
  bind();
  document.getElementById('addTemplate').onclick=()=>{
    syncFromDOM();
    working.push({label:'新工序', color:nextColor(), minutes:10});
    rerender();
    const inputs=document.querySelectorAll('#tBody .tLabel');
    const last=inputs[inputs.length-1];
    if(last){ last.scrollIntoView({block:'nearest'}); last.focus(); last.select(); }
  };
  document.getElementById('tSave').onclick=async ()=>{
    syncFromDOM();
    working.forEach(t=>{
      t.label=(t.label||'').trim()||'未命名工序';
      t.minutes=Math.max(1, parseInt(t.minutes,10)||10);
    });
    state.templates=working;
    const saved=await saveBoard();
    __closeTemplates();
    /* 通知打开中的任务弹窗刷新快速选择标签 */
    document.dispatchEvent(new CustomEvent('gantt-templates-updated'));
    showToast(saved?'工序模板已更新，快速选择标签已同步。':'工序模板已保留在本页，待手动同步。');
  };
};
window.__closeTemplates = function(){
  const o=document.getElementById('templatesOverlay');
  if(o) o.remove();
};

  const fab=document.createElement('button');

/* 全局快捷键：N 新建 / T 回到现在 / F 聚焦搜索（输入框和弹窗打开时不触发） */
document.addEventListener('keydown',(e)=>{
  if(document.querySelector('.overlay')) return;
  const tag=(e.target&&e.target.tagName)||'';
  if(tag==='INPUT'||tag==='TEXTAREA'||tag==='SELECT'||e.ctrlKey||e.metaKey||e.altKey) return;
  const k=e.key.toLowerCase();
  if(k==='n'){ e.preventDefault(); window.__openNew(false); }
  else if(k==='t'){ e.preventDefault(); window.__gotoNow(); }
  else if(k==='f'){ e.preventDefault(); const sb=document.getElementById('searchBox'); if(sb) sb.focus(); }
});

/* ======================================================================
   Supabase 建表 SQL（在 Supabase 控制台 → SQL Editor 里运行一次）：

   create table if not exists gantt_board (
